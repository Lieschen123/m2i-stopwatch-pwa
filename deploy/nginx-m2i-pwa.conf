# M2I Move2Improve App - privacy-first static HTTPS host
# Target: /etc/nginx/sites-available/m2i-app
# Enable with: sudo ln -sfn /etc/nginx/sites-available/m2i-app /etc/nginx/sites-enabled/m2i-app

server {
    listen 80;
    listen [::]:80;
    server_name app.move2improve.io;

    # Let certbot solve HTTP-01, redirect everything else after cert is issued.
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name app.move2improve.io;

    root /home/m2i/m2i-stopwatch-pwa/current;
    index index.html;

    # Privacy: do not create an access trail of workout testing.
    access_log off;
    error_log /var/log/nginx/m2i-app.error.log warn;

    # Certbot will manage these paths.
    ssl_certificate /etc/letsencrypt/live/app.move2improve.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.move2improve.io/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self'; connect-src wss://*; manifest-src 'self'; worker-src 'self'; base-uri 'self'; form-action 'self'" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Permissions-Policy "geolocation=(self), microphone=(), camera=(), payment=()" always;

    location = /sw.js {
        add_header Cache-Control "no-cache" always;
        try_files $uri =404;
    }

    location = /manifest.webmanifest {
        add_header Content-Type "application/manifest+json" always;
        try_files $uri =404;
    }

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
